name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            python: "3.11"
            arch: arm64
          - os: ubuntu-24.04
            python: "3.11"
            arch: x86_64
          - os: ubuntu-24.04-arm
            python: "3.11"
            arch: aarch64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # [fast] pulls numba so the backend-equivalence guard
          # (tests/test_accel_kernels.py) RUNS in CI on every arch (arm64 +
          # x86_64 + aarch64) instead of skipping — this is what catches any
          # cross-architecture float drift in the JIT kernels vs the numpy ref.
          # [gpu] pulls mlx ONLY on the Apple-Silicon runner (env marker; no-op
          # on Linux), so tests/test_accel_mlx.py runs the Metal GPU equivalence
          # check on macos-14 and skips elsewhere.
          python -m pip install -e '.[dev,fast,gpu]'

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -ra

  build:
    name: build sdist + wheel
    runs-on: ubuntu-24.04
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
